name: R Analysis Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
      - "feat/**"
  pull_request:

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::caret
            any::randomForest
            any::pROC
            any::ggplot2
            any::dplyr
            any::fastDummies
            any::reshape2
            any::smotefamily
            any::e1071
            any::kernlab
            any::rpart
            any::tidyr

      - name: Create outputs directory
        run: mkdir -p outputs

      - name: Run full analysis pipeline
        shell: Rscript {0}
        run: |
          source("R_Scripts/german_credit_wrangle_JT.R")
          source("R_Scripts/german_credit_data_prep_FB.R")
          source("R_Scripts/german_credit_modelling_FB.R")
          source("R_Scripts/german_credit_models_JP.R")
          source("R_Scripts/german_credit_fairness_JP.R")
          source("R_Scripts/german_credit_synthesis_FB.R")

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: german-credit-analysis-outputs
          path: outputs/
