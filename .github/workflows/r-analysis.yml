name: R Analysis Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
      - "feat/**"
    paths-ignore:
      - "outputs/**"
  pull_request:

permissions:
  contents: write

jobs:
  run-analysis:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::caret
            any::randomForest
            any::pROC
            any::ggplot2
            any::dplyr
            any::fastDummies
            any::reshape2
            any::smotefamily
            any::e1071
            any::kernlab
            any::rpart
            any::tidyr
            any::class

      - name: Ensure outputs directory exists
        run: mkdir -p outputs

      - name: Run full analysis pipeline
        shell: Rscript {0}
        run: |
          source("R_Scripts/1_Wrangle_FB_JT.R")
          source("R_Scripts/2_Data_Prep_FB_JT.R")
          source("R_Scripts/3_Modelling_FB_SH.R")
          source("R_Scripts/5_Extended_Modelling_JP.R")
          source("R_Scripts/6_Fairness_JP.R")
          source("R_Scripts/4_Synthesis_FB_JT.R")

      - name: Show outputs
        run: |
          echo "Contents of outputs/:"
          ls -la outputs

      - name: Commit generated outputs back to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "Update generated outputs"
          git push

      - name: Upload outputs artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: german-credit-analysis-outputs
          path: outputs/
          retention-days: 5
